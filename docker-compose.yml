services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobtrackr
      POSTGRES_PASSWORD: jobtrackr
      POSTGRES_DB: jobtrackr
    ports:
      - "5432:5432"
    volumes:
      - jobtrackr_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobtrackr"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://jobtrackr:jobtrackr@db:5432/jobtrackr
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_IN: "86400"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./backend:/app
      - jobtrackr_resume_data:/data/resumes
    ports:
      - "8000:8000"
volumes:
  jobtrackr_db_data:
  jobtrackr_resume_data: